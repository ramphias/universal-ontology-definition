# ═══════════════════════════════════════════════════════════════════════════════
# Universal Enterprise Ontology Core — GraphQL Schema Binding
# L0 Platform Binding for L1 Core v2.0.0
# ═══════════════════════════════════════════════════════════════════════════════

"""
Root Query type for accessing ontology entities.
"""
type Query {
  party(id: ID!): Party
  parties(filter: PartyFilter, limit: Int = 50): [Party!]!

  organization(id: ID!): Organization
  organizations(filter: OrgFilter, limit: Int = 50): [Organization!]!

  process(id: ID!): Process
  processes(filter: ProcessFilter, limit: Int = 50): [Process!]!

  capability(id: ID!): Capability
  capabilities(limit: Int = 50): [Capability!]!

  goal(id: ID!): Goal
  goals(limit: Int = 50): [Goal!]!

  risk(id: ID!): Risk
  risks(limit: Int = 50): [Risk!]!

  axiom(id: ID!): Axiom
  axioms(type: AxiomType, limit: Int = 50): [Axiom!]!
}

# ─── Abstract Domain: Entity ─────────────────────────────────────────────────

"""
The superclass of all entities that can participate in business
and governance relationships (主体).
"""
interface Party {
  id: ID!
  labelZh: String!
  labelEn: String!
  definition: String
  roles: [Role!]!
  ownedResources: [Resource!]!
}

"""
A natural person entity (人员).
"""
type Person implements Party {
  id: ID!
  labelZh: String!
  labelEn: String!
  definition: String
  roles: [Role!]!
  ownedResources: [Resource!]!
}

"""
A legal or non-legal organization entity (组织).
"""
type Organization implements Party {
  id: ID!
  labelZh: String!
  labelEn: String!
  definition: String
  roles: [Role!]!
  ownedResources: [Resource!]!
  units: [OrgUnit!]!
}

"""
Internal organizational unit such as department, team, committee (组织单元).
"""
type OrgUnit {
  id: ID!
  labelZh: String!
  labelEn: String!
  definition: String
  partOf: Organization!
}

# ─── Abstract Domain: Resource ───────────────────────────────────────────────

"""
Tangible or intangible resources created, modified, managed,
or consumed by business processes (资源).
"""
interface Resource {
  id: ID!
  labelZh: String!
  labelEn: String!
  definition: String
}

"""
Products and services provided externally or used internally (产品与服务).
"""
type ProductService implements Resource {
  id: ID!
  labelZh: String!
  labelEn: String!
  definition: String
}

"""
Financial, physical, knowledge, data, brand, and other assets (资产).
"""
type Asset implements Resource {
  id: ID!
  labelZh: String!
  labelEn: String!
  definition: String
}

"""
A structured or unstructured data entity (数据对象).
"""
type DataObject implements Resource {
  id: ID!
  labelZh: String!
  labelEn: String!
  definition: String
  recordedIn: [SystemApplication!]!
}

"""
Contracts, reports, files, documents, and records (文档).
"""
type Document implements Resource {
  id: ID!
  labelZh: String!
  labelEn: String!
  definition: String
  recordedIn: [SystemApplication!]!
}

"""
Software systems supporting processes, data, and decision-making (系统应用).
"""
type SystemApplication implements Resource {
  id: ID!
  labelZh: String!
  labelEn: String!
  definition: String
}

# ─── Abstract Domain: Governance ─────────────────────────────────────────────

"""
Abstract domain for constraints, governance, and risk management (治理).
"""
interface Governance {
  id: ID!
  labelZh: String!
  labelEn: String!
  definition: String
}

"""
Management principles and constraint requirements (政策).
"""
type Policy implements Governance {
  id: ID!
  labelZh: String!
  labelEn: String!
  definition: String
}

"""
Executable and evaluable business or control rules (规则).
"""
type Rule implements Governance {
  id: ID!
  labelZh: String!
  labelEn: String!
  definition: String
}

"""
Control measures to reduce risk and ensure compliance and quality (控制).
"""
type Control implements Governance {
  id: ID!
  labelZh: String!
  labelEn: String!
  definition: String
}

"""
Uncertain events or conditions that may affect goal achievement (风险).
"""
type Risk implements Governance {
  id: ID!
  labelZh: String!
  labelEn: String!
  definition: String
  mitigatedBy: [Control!]!
}

# ─── Abstract Domain: Operational ────────────────────────────────────────────

"""
An identity or responsibility assumed by a party in a given context (角色).
"""
type Role {
  id: ID!
  labelZh: String!
  labelEn: String!
  definition: String
  accountableFor: [Capability!]!
  governedBy: [Governance!]!
  measuredBy: [KPI!]!
}

"""
A stable and reusable business capability possessed by an organization (能力).
"""
type Capability {
  id: ID!
  labelZh: String!
  labelEn: String!
  definition: String
  realizedBy: [Process!]!
  governedBy: [Governance!]!
  measuredBy: [KPI!]!
}

"""
An end-to-end sequence of activities defined to achieve business objectives (流程).
Sub-activities expressed via part_of relation.
"""
type Process {
  id: ID!
  labelZh: String!
  labelEn: String!
  definition: String
  parts: [Process!]!
  consumes: [Resource!]!
  produces: [Resource!]!
  governedBy: [Governance!]!
  measuredBy: [KPI!]!
  triggeredByEvents: [Event!]!
}

"""
A state change occurring in the business or technical environment (事件).
"""
type Event {
  id: ID!
  labelZh: String!
  labelEn: String!
  definition: String
  triggeredProcesses: [Process!]!
}

# ─── Abstract Domain: Measurement ────────────────────────────────────────────

"""
Outcomes an organization aims to achieve (目标).
"""
type Goal {
  id: ID!
  labelZh: String!
  labelEn: String!
  definition: String
  measuredBy: [KPI!]!
}

"""
Metrics that measure the degree of goal achievement (关键指标).
"""
type KPI {
  id: ID!
  labelZh: String!
  labelEn: String!
  definition: String
}

# ─── Input Filters ───────────────────────────────────────────────────────────

input PartyFilter {
  labelContains: String
  type: PartyType
}

input OrgFilter {
  labelContains: String
}

input ProcessFilter {
  labelContains: String
  governedByPolicy: ID
}

enum PartyType {
  PERSON
  ORGANIZATION
}

# ─── Axioms ─────────────────────────────────────────────────────────────────

"""
Formal semantic axiom constraining classes and/or relations.
Maps to OWL 2 constructs (disjointWith, Restriction, TransitiveProperty, etc.).
"""
type Axiom {
  id: ID!
  type: AxiomType!
  labelZh: String!
  labelEn: String
  definition: String
  definitionEn: String
  """Class IDs involved (for disjoint axioms)."""
  classes: [String!]
  """The class being constrained (for cardinality, existential, universal axioms)."""
  subjectClass: String
  """Relation ID being constrained or characterized."""
  relation: String
  """The filler/target class (for existential, universal axioms)."""
  objectClass: String
  """Cardinality value (for cardinality axioms)."""
  value: Int
  """Parent relation ID (for subproperty axioms)."""
  parentRelation: String
  status: String
  since: String
}

"""
Axiom type enum mapping to OWL 2 constructs.
"""
enum AxiomType {
  DISJOINT
  CARDINALITY_MIN
  CARDINALITY_MAX
  CARDINALITY_EXACT
  EXISTENTIAL
  UNIVERSAL
  FUNCTIONAL
  INVERSE_FUNCTIONAL
  SYMMETRIC
  ASYMMETRIC
  TRANSITIVE
  SUBPROPERTY
}
