name: Deploy Documentation

on:
  push:
    branches:
      - master
    paths:
      - 'docs-site/**'
      - 'docs/**'
      - '.github/workflows/deploy-docs.yml'
      - 'mkdocs.yml'
  pull_request:
    paths:
      - 'docs-site/**'
      - 'docs/**'
      - '.github/workflows/deploy-docs.yml'
      - 'mkdocs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Per-ref concurrency so PR builds don't block each other or the master deploy.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build documentation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install mkdocs-material pymdown-extensions mkdocs-include-markdown-plugin

      - name: Regenerate auto-glossary fragments
        run: python scripts/generate_glossary.py

      - name: Build documentation (strict — fail on broken links / missing nav)
        run: mkdocs build --strict

      - name: Assemble final site
        run: |
          mkdir -p site
          cp -r _mkdocs_site/* site/
          touch site/.nojekyll
          echo "--- Site Layout ---"
          find site -maxdepth 1

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request'
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
