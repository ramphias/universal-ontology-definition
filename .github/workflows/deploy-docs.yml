name: Deploy Documentation

on:
  push:
    branches:
      - master
    paths:
      - 'docs-site/**'
      - 'docs/**'
      - '.github/workflows/**'
      - 'mkdocs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install mkdocs-material pymdown-extensions

      - name: Build documentation
        run: mkdocs build --strict

      - name: Assemble final site
        run: |
          mkdir -p site/docs
          # Copy landing page to root
          cp docs/index.html site/
          # Copy landing page assets if they exist
          [ -d "docs/css" ] && cp -r docs/css site/ || echo "No docs/css"
          [ -d "docs/js" ] && cp -r docs/js site/ || echo "No docs/js"
          # Copy mkdocs site to /docs subfolder
          cp -r _mkdocs_site/* site/docs/
          touch site/.nojekyll
          # Verify structure
          echo "--- Site Layout ---"
          find site -maxdepth 2

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
